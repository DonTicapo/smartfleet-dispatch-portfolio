upstream otl_core {
    server host.docker.internal:3000;
}
upstream ntb_bridge {
    server host.docker.internal:3001;
}
upstream dct_tower {
    server host.docker.internal:3002;
}
upstream cvp_portal {
    server host.docker.internal:3003;
}
upstream aih_hub {
    server host.docker.internal:3004;
}
upstream peob_bridge {
    server host.docker.internal:3005;
}

server {
    listen 8080;
    server_name localhost;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Correlation ID propagation
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Correlation-ID $correlation_id;

    # ── Order Ticket Load Core ──────────────────
    location /api/otl/ {
        rewrite ^/api/otl/(.*) /$1 break;
        proxy_pass http://otl_core;
    }

    # ── Navixy Telematics Bridge ────────────────
    location /api/ntb/ {
        rewrite ^/api/ntb/(.*) /$1 break;
        proxy_pass http://ntb_bridge;
    }

    # ── Dispatch Control Tower ──────────────────
    location /api/dct/ {
        rewrite ^/api/dct/(.*) /$1 break;
        proxy_pass http://dct_tower;
    }

    # ── Customer Visibility Portal ──────────────
    location /api/cvp/ {
        rewrite ^/api/cvp/(.*) /$1 break;
        proxy_pass http://cvp_portal;
    }

    # WebSocket support for CVP load tracking
    location /ws/ {
        proxy_pass http://cvp_portal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Analytics Integration Hub ───────────────
    location /api/aih/ {
        rewrite ^/api/aih/(.*) /$1 break;
        proxy_pass http://aih_hub;
    }

    # ── Plant Edge OT Bridge ────────────────────
    location /api/peob/ {
        rewrite ^/api/peob/(.*) /$1 break;
        proxy_pass http://peob_bridge;
    }

    # ── Health aggregator ───────────────────────
    location /health {
        default_type application/json;
        return 200 '{"gateway":"ok"}';
    }

    # ── Swagger docs (per service) ──────────────
    location /docs/otl/  { rewrite ^/docs/otl/(.*) /docs/$1 break; proxy_pass http://otl_core; }
    location /docs/ntb/  { rewrite ^/docs/ntb/(.*) /docs/$1 break; proxy_pass http://ntb_bridge; }
    location /docs/dct/  { rewrite ^/docs/dct/(.*) /docs/$1 break; proxy_pass http://dct_tower; }
    location /docs/cvp/  { rewrite ^/docs/cvp/(.*) /docs/$1 break; proxy_pass http://cvp_portal; }
    location /docs/aih/  { rewrite ^/docs/aih/(.*) /docs/$1 break; proxy_pass http://aih_hub; }
    location /docs/peob/ { rewrite ^/docs/peob/(.*) /docs/$1 break; proxy_pass http://peob_bridge; }

    # ── Rate limiting ───────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    location / {
        limit_req zone=api burst=50 nodelay;
        return 404 '{"error":"Not found. Use /api/{otl,ntb,dct,cvp,aih,peob}/..."}';
        default_type application/json;
    }
}
