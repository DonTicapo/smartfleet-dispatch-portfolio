services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5437:5432'
    environment:
      POSTGRES_USER: peob
      POSTGRES_PASSWORD: peob_dev
      POSTGRES_DB: peob_bridge
    volumes:
      - peob_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peob -d peob_bridge']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  peob_pgdata:
